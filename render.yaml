services:
  - type: web
    name: medusa-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # GROQ_API_KEY: no se pega acá en el archivo. Con "sync: false", Render
      # muestra un campo de texto vacío para esta variable durante el deploy
      # (en la página del botón "Deploy to Render") — es ahí, en esa página
      # web de Render, donde pegás tu clave real.
      - key: GROQ_API_KEY
        sync: false
      # ELEVENLABS_API_KEY: mismo caso, se pega en el formulario de Render,
      # nunca en este archivo. Es opcional: sin ella, el chat responde con
      # texto y voz del navegador, sin la voz de IA.
      - key: ELEVENLABS_API_KEY
        sync: false
      # Voice_id de ElevenLabs (Voice Library) para que la voz de IA
      # hable en español. Sin ninguna de las dos, /tts devuelve un error
      # claro en vez de usar una voz en inglés en silencio. Se pueden
      # dejar vacías y completar después sin rehacer el deploy.
      - key: ELEVENLABS_VOICE_ID_HOMBRE
        sync: false
      - key: ELEVENLABS_VOICE_ID_MUJER
        sync: false
      # Opcionales: ajustes de la voz de ElevenLabs y modelos por
      # contexto. Ver la tabla de variables de entorno en README.md — los
      # valores por defecto del backend (si se dejan vacías) son un punto
      # de partida razonable, no un ajuste universal para cualquier voz.
      - key: ELEVENLABS_MODEL_CHAT
        sync: false
      - key: ELEVENLABS_MODEL_DOCUMENT
        sync: false
      - key: ELEVENLABS_STABILITY
        sync: false
      - key: ELEVENLABS_SIMILARITY
        sync: false
      - key: ELEVENLABS_STYLE
        sync: false
      - key: ELEVENLABS_SPEED
        sync: false
      - key: ELEVENLABS_SPEAKER_BOOST
        sync: false
      # Opcionales: límites de /tts para proteger la cuota gratis de
      # ElevenLabs. Ver README.md para los valores por defecto.
      - key: TTS_RATE_LIMIT_PER_MIN
        sync: false
      - key: TTS_DAILY_LIMIT
        sync: false
      # Opcional: solo si servís el frontend desde un dominio propio además
      # de GitHub Pages y localhost.
      - key: ALLOWED_ORIGIN
        sync: false
