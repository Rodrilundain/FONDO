services:
  - type: web
    name: medusa-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # GROQ_API_KEY: no se pega acá en el archivo. Con "sync: false", Render
      # muestra un campo de texto vacío para esta variable durante el deploy
      # (en la página del botón "Deploy to Render") — es ahí, en esa página
      # web de Render, donde pegás tu clave real.
      - key: GROQ_API_KEY
        sync: false
      # ELEVENLABS_API_KEY: mismo caso, se pega en el formulario de Render,
      # nunca en este archivo. Es opcional: sin ella, el chat responde con
      # texto y voz del navegador, sin la voz de IA.
      - key: ELEVENLABS_API_KEY
        sync: false
