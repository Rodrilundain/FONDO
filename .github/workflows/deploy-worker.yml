# Despliega el Worker de IA (Cloudflare) cada vez que cambia algo en
# worker/ y se pushea a main. Requiere el secreto CLOUDFLARE_API_TOKEN
# (y opcionalmente CLOUDFLARE_ACCOUNT_ID) configurado en GitHub:
# Settings -> Secrets and variables -> Actions. Ver worker/README.md,
# seccion "Despliegue automatico con GitHub Actions" para como generarlos.
#
# Este workflow NO toca los secretos del propio Worker (GEMINI_API_KEY,
# OPENROUTER_API_KEY): esos se configuran una sola vez con
# "wrangler secret put" desde tu compu y quedan guardados del lado de
# Cloudflare -- "wrangler deploy" no los borra ni los pisa.
#
# El despliegue depende de que pasen los tests (needs: test, Etapa 4 de
# la auditoría de seguridad): nunca despliega una versión con tests
# fallando.

name: Deploy Worker de IA (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
