# Publica SOLO el frontend estático en GitHub Pages (Etapa 4 de la
# auditoría de seguridad). Antes esto publicaba el repositorio entero con
# "path: ." -- eso exponía server/, worker/, tests, el Dockerfile y
# documentación interna en la URL pública. Ahora arma una carpeta dist/
# con nada más que lo que el navegador necesita (index.html, css/, js/) y
# publica esa carpeta.
#
# El despliegue depende de que pasen los tests (needs: test): nunca
# publica una versión con tests fallando.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/tests-reusable.yml

  build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Armar dist/ solo con los archivos públicos del frontend
        run: |
          set -eu
          mkdir dist
          cp index.html dist/
          cp -r css dist/css
          # cp -r + limpieza explícita (no rsync, para no depender de que
          # esté instalado en el runner): js/ tiene carpetas __tests__ y
          # archivos *.test.mjs (Punto 4 de la auditoría v2) que son
          # código de pruebas, no algo que el navegador necesite --
          # confirmado revisando el dist/ real que arma este paso, un
          # "cp -r js dist/js" simple los copiaba igual.
          cp -r js dist/js
          find dist/js -type d -name '__tests__' -exec rm -rf {} +
          find dist/js -type f -name '*.test.mjs' -delete
          # Opcionales: solo se copian si de verdad existen en el repo
          # (Punto 9 de la auditoría v2 -- hoy este repo no tiene ninguno
          # de estos, pero si se agregan más adelante quedan cubiertos
          # sin tener que tocar este workflow).
          [ -d assets ] && cp -r assets dist/assets || true
          [ -f manifest.json ] && cp manifest.json dist/ || true
          [ -f service-worker.js ] && cp service-worker.js dist/ || true
          for f in favicon.ico favicon.png favicon.svg; do
            [ -f "$f" ] && cp "$f" dist/ || true
          done
          echo "Contenido final de dist/:"
          find dist -type f | sort
      - name: Verificar que dist/ NO contenga nada que no deba publicarse
        run: |
          set -eu
          # Lista blanca explícita (Punto 9 de la auditoría v2): si algo
          # que no está acá termina en dist/ -- por ejemplo, un cambio
          # futuro en el paso de arriba que copie de más --, el despliegue
          # falla en vez de publicar el repositorio entero por accidente
          # (esto ya pasó antes: "path: ." publicaba server/worker/tests).
          PERMITIDOS="index.html css js assets manifest.json service-worker.js favicon.ico favicon.png favicon.svg"
          fail=0
          # find (no un glob de shell) para no pasar por alto archivos
          # ocultos como .env si algún día terminaran copiados por error.
          while IFS= read -r nombre; do
            permitido=0
            for p in $PERMITIDOS; do
              [ "$nombre" = "$p" ] && permitido=1 && break
            done
            if [ "$permitido" -eq 0 ]; then
              echo "::error::dist/$nombre no está en la lista blanca de lo que se puede publicar."
              fail=1
            fi
          done < <(find dist -mindepth 1 -maxdepth 1 -printf '%f\n')
          # Chequeo explícito de los directorios que NUNCA deben aparecer,
          # con nombre y mensaje claro (más fácil de leer en el log que
          # solo "no está en la lista blanca").
          for prohibido in server worker .github docs tests .env Dockerfile node_modules; do
            if [ -e "dist/$prohibido" ]; then
              echo "::error::dist/$prohibido no debería existir -- se estaría publicando algo que no es parte del frontend."
              fail=1
            fi
          done
          # Chequeo en profundidad (no solo el nivel raíz de dist/): nada
          # que sea código de pruebas debería colarse en ninguna
          # subcarpeta (ej. js/security/__tests__).
          encontrados=$(find dist \( -type d -name '__tests__' -o -type f -name '*.test.mjs' -o -type f -name '.env*' \) 2>/dev/null || true)
          if [ -n "$encontrados" ]; then
            echo "::error::Se encontró código de pruebas o un .env dentro de dist/:"
            echo "$encontrados"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            echo "Contenido completo de dist/ (para diagnosticar):"
            find dist | sort
            exit 1
          fi
          echo "dist/ contiene solo lo esperado."
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
