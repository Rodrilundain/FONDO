<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medusa Inteligente – Grupo Fiancar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #030712 0%, #000 90%);
      font-family: "Inter", sans-serif;
      color: #7dcaff;
    }
    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block; cursor: none;
    }

    /* Menú hamburguesa */
    .menu-btn {
      position: absolute;
      top: 15px; right: 20px;
      z-index: 10;
      width: 32px; height: 24px;
      cursor: pointer;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }
    .menu-btn div {
      height: 4px;
      background: #7dcaff;
      border-radius: 2px;
      transition: 0.3s;
    }
    .menu {
      position: absolute;
      top: 55px; right: 15px;
      width: 270px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 15;
      backdrop-filter: blur(8px);
    }
    .menu.open { display: flex; }
    .menu label {
      font-size: 0.9em;
      color: #9cdcff;
      margin-bottom: 2px;
    }
    .menu input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
    }
    .menu input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 6px;
    }
    .menu select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      background: #0a1724;
      color: #7dcaff;
      font-size: 0.85em;
      outline: none;
    }
    .menu input[type="range"] {
      width: 100%;
      accent-color: #7dcaff;
    }
    .menu input[type="file"] {
      width: 100%;
      font-size: 0.75em;
      color: #9cdcff;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .btn-row .btn-stop {
      flex: 1 1 auto;
      margin-top: 0;
      white-space: nowrap;
    }
    .url-box {
      display: flex;
      flex-direction: column;
    }
    .url-box input {
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      background: #0a1724;
      color: #7dcaff;
      font-size: 0.8em;
      outline: none;
    }
    .status {
      font-size: 0.8em;
      margin-top: 4px;
      color: #9cdcff;
      opacity: 0.8;
    }
    .btn-stop {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(125,202,255,0.1);
      color: #7dcaff;
      font-size: 0.8em;
      cursor: pointer;
    }
    .btn-stop:hover {
      background: rgba(125,202,255,0.2);
    }

    /* Chat */
    .chat {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 480px;
      background: rgba(0,0,0,0.6);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      box-shadow: 0 -2px 18px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      padding: 12px;
      color: #cde9ff;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    .messages {
      flex: 1;
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.9em;
      margin-bottom: 8px;
    }
    .msg {
      margin: 4px 0;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1.3;
    }
    .msg.user { background: rgba(125,202,255,0.15); text-align: right; }
    .msg.bot { background: rgba(125,202,255,0.05); text-align: left; }
    .chat input {
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      width: 100%;
      outline: none;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Menú hamburguesa -->
  <div class="menu-btn" id="menuBtn">
    <div></div><div></div><div></div>
  </div>

  <div class="menu" id="menu">
    <div>
      <label for="color">🎨 Color manual</label>
      <input type="color" id="color" value="#7dcaff">
    </div>

    <div>
      <label><input type="checkbox" id="autoColor"> Cambio automático</label>
    </div>

    <div>
      <label><input type="checkbox" id="vozActiva" checked> 🔊 Voz activada</label>
    </div>

    <div>
      <label for="vozTipo">🗣️ Tipo de voz</label>
      <select id="vozTipo">
        <option value="robotica">🤖 Robotrónica</option>
        <option value="hombre">👨 Hombre (latino/uruguayo)</option>
        <option value="mujer">👩 Mujer (latina/uruguaya)</option>
      </select>
    </div>

    <div>
      <label for="vozVelocidad">⏩ Velocidad: <span id="velocidadValor">1.0x</span></label>
      <input type="range" id="vozVelocidad" min="0.5" max="2" step="0.1" value="1">
    </div>

    <div class="url-box">
      <label for="docUrl">🗂️ URL documento</label>
      <input type="text" id="docUrl" placeholder="https://ejemplo.com/documento">
    </div>

    <div class="url-box">
      <label for="docFile">📁 Subir archivo (.txt, .md, .pdf)</label>
      <input type="file" id="docFile" accept=".txt,.md,.pdf">
    </div>

    <div class="status" id="status">Sin documento cargado</div>

    <div class="btn-row">
      <button id="playBtn" class="btn-stop">▶️ Reproducir</button>
      <button id="pauseBtn" class="btn-stop">⏸️ Pausar</button>
      <button id="resumeBtn" class="btn-stop">⏵ Reanudar</button>
      <button id="detenerVoz" class="btn-stop">🔇 Detener</button>
    </div>

    <div class="url-box">
      <label for="backendUrlInput">🔌 Backend de preguntas</label>
      <input type="text" id="backendUrlInput" placeholder="https://tu-backend.onrender.com">
    </div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="messages" id="messages"></div>
    <input type="text" id="question" placeholder="Escribí tu pregunta y presioná Enter...">
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { alpha: true });
    const colorPicker = document.getElementById("color");
    const autoColor = document.getElementById("autoColor");
    const menu = document.getElementById("menu");
    const menuBtn = document.getElementById("menuBtn");
    const docUrlInput = document.getElementById("docUrl");
    const docFileInput = document.getElementById("docFile");
    const status = document.getElementById("status");
    const chat = document.getElementById("chat");
    const messages = document.getElementById("messages");
    const question = document.getElementById("question");
    const vozActivaToggle = document.getElementById("vozActiva");
    const vozTipoSelect = document.getElementById("vozTipo");
    const vozVelocidadSlider = document.getElementById("vozVelocidad");
    const velocidadValor = document.getElementById("velocidadValor");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const detenerVozBtn = document.getElementById("detenerVoz");
    const backendUrlInput = document.getElementById("backendUrlInput");

    menuBtn.addEventListener("click", () => menu.classList.toggle("open"));

    // === Color control ===
    let mainColor = colorPicker.value;
    let autoHue = 200;
    let autoMode = false;
    colorPicker.addEventListener("input", e => mainColor = e.target.value);
    autoColor.addEventListener("change", e => autoMode = e.target.checked);

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
        return Math.round(255 * color);
      };
      return "#" + [f(0), f(8), f(4)]
        .map(x => x.toString(16).padStart(2, "0")).join("");
    }
    function hexToRgb(hex) {
      const bigint = parseInt(hex.slice(1), 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return { r, g, b };
    }

    // === Voz ===
    let vozActiva = vozActivaToggle.checked;
    let vozTipo = vozTipoSelect.value; // "robotica" | "hombre" | "mujer"
    let vozVelocidad = parseFloat(vozVelocidadSlider.value);

    vozActivaToggle.addEventListener("change", e => {
      vozActiva = e.target.checked;
      if (!vozActiva) window.speechSynthesis.cancel();
    });
    vozTipoSelect.addEventListener("change", e => vozTipo = e.target.value);
    vozVelocidadSlider.addEventListener("input", e => {
      vozVelocidad = parseFloat(e.target.value);
      velocidadValor.textContent = vozVelocidad.toFixed(1) + "x";
    });
    detenerVozBtn.addEventListener("click", () => window.speechSynthesis.cancel());

    playBtn.addEventListener("click", () => {
      if (!documentoCargado) {
        status.textContent = "⚠️ Cargá un documento o archivo primero.";
        return;
      }
      speakRobotic(documentoCargado);
    });
    pauseBtn.addEventListener("click", () => {
      if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
        window.speechSynthesis.pause();
      }
    });
    resumeBtn.addEventListener("click", () => {
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }
    });

    // === Backend de preguntas (configurable, se guarda en el navegador) ===
    let BACKEND_URL = localStorage.getItem("medusaBackendUrl") || "";
    backendUrlInput.value = BACKEND_URL;
    backendUrlInput.addEventListener("change", () => {
      BACKEND_URL = backendUrlInput.value.trim().replace(/\/+$/, "");
      localStorage.setItem("medusaBackendUrl", BACKEND_URL);
    });

    function chunkText(text, maxLen = 220) {
      const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
      const chunks = [];
      let current = "";
      for (const s of sentences) {
        if ((current + s).length > maxLen) {
          if (current) chunks.push(current.trim());
          current = s;
        } else {
          current += s;
        }
      }
      if (current) chunks.push(current.trim());
      return chunks;
    }

    // Los navegadores no exponen un acento "uruguayo" puntual: elegimos la
    // variante de español rioplatense/latina más cercana disponible
    // (es-UY, es-AR, es-419, es-MX...) y afinamos el tono según el género
    // elegido. Si el sistema no tiene ninguna voz en español, se usa la
    // que haya por defecto.
    function pickVoice(tipo) {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return null;
      const esVoices = voices.filter(v => /^es/i.test(v.lang));
      const rioplatenses = esVoices.filter(v => /es-(UY|AR|419)/i.test(v.lang));
      const latam = esVoices.filter(v => /es-(MX|US|CO|CL|PE)/i.test(v.lang));
      const pool = rioplatenses.length ? rioplatenses : (latam.length ? latam : (esVoices.length ? esVoices : voices));

      if (tipo === "mujer") {
        return pool.find(v => /female|mujer|women|paulina|helena|sabina|monica|lucia|camila|valentina|elena/i.test(v.name)) || pool[0];
      }
      if (tipo === "hombre") {
        return pool.find(v => /male|hombre|men\b|jorge|diego|juan|carlos|pablo|enrique|miguel/i.test(v.name)) || pool[0];
      }
      return pool[0]; // robotica: el efecto lo da el pitch, la voz de base da igual
    }

    function pitchFor(tipo) {
      if (tipo === "hombre") return 0.75;
      if (tipo === "mujer") return 1.3;
      return 0.15; // robotica: grave y metálico
    }

    function speakRobotic(text, { interrupt = true } = {}) {
      if (!vozActiva || !text || !("speechSynthesis" in window)) return;
      if (interrupt) window.speechSynthesis.cancel();
      const voice = pickVoice(vozTipo);
      const pitch = pitchFor(vozTipo);
      const chunks = chunkText(text);
      for (const chunk of chunks) {
        const utterance = new SpeechSynthesisUtterance(chunk);
        utterance.lang = (voice && voice.lang) || "es-UY";
        utterance.pitch = pitch;
        utterance.rate = vozVelocidad;
        utterance.volume = 1;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
      }
    }

    // === Documento remoto ===
    let documentoCargado = "";

    function htmlToText(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      return doc.body.innerText.replace(/\s+/g, " ").trim();
    }

    // AllOrigins es gratuito pero poco confiable (sin SLA, rate-limit agresivo,
    // suele devolver contents:null). Probamos primero lectores más estables y
    // caemos a AllOrigins solo como último recurso.
    const DOC_READERS = [
      async url => {
        const res = await fetch("https://r.jina.ai/" + url);
        if (!res.ok) throw new Error("r.jina.ai respondió " + res.status);
        return (await res.text()).trim();
      },
      async url => {
        const res = await fetch("https://corsproxy.io/?url=" + encodeURIComponent(url));
        if (!res.ok) throw new Error("corsproxy.io respondió " + res.status);
        return htmlToText(await res.text());
      },
      async url => {
        const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
        if (!res.ok) throw new Error("allorigins respondió " + res.status);
        const data = await res.json();
        if (!data || !data.contents) throw new Error("allorigins devolvió contents vacío");
        return htmlToText(data.contents);
      }
    ];

    async function fetchDocumentText(url) {
      let lastError;
      for (const reader of DOC_READERS) {
        try {
          const text = await reader(url);
          if (text) return text;
        } catch (err) {
          lastError = err;
          console.warn("Lector de documento falló, probando el siguiente:", err);
        }
      }
      throw lastError || new Error("No se obtuvo contenido del documento.");
    }

    async function loadDocumentFromUrl(url) {
      url = (url || "").trim();
      if (!url) return;
      status.textContent = "Cargando documento...";
      try {
        documentoCargado = await fetchDocumentText(url);
        status.textContent = "✅ Documento cargado correctamente.";
        chat.style.display = "flex";
        speakRobotic(`Documento cargado correctamente. Iniciando lectura. ${documentoCargado}`);
      } catch (err) {
        console.error(err);
        documentoCargado = "";
        status.textContent = "⚠️ Error al leer el documento. Probá con otra URL o verificá que sea pública.";
        speakRobotic("Error al leer el documento.");
      }
    }

    docUrlInput.addEventListener("change", () => loadDocumentFromUrl(docUrlInput.value));

    async function extractPdfText(arrayBuffer) {
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let text = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(" ") + "\n";
      }
      return text;
    }

    docFileInput.addEventListener("change", async () => {
      const file = docFileInput.files[0];
      if (!file) return;
      status.textContent = "Leyendo archivo...";
      try {
        let text;
        if (/\.pdf$/i.test(file.name) || file.type === "application/pdf") {
          if (!window.pdfjsLib) throw new Error("No se pudo cargar el lector de PDF.");
          text = await extractPdfText(await file.arrayBuffer());
        } else {
          text = await file.text();
        }
        documentoCargado = text.replace(/\s+/g, " ").trim();
        if (!documentoCargado) throw new Error("El archivo está vacío.");

        status.textContent = `✅ "${file.name}" cargado correctamente.`;
        chat.style.display = "flex";
        speakRobotic(`Archivo cargado correctamente. Iniciando lectura. ${documentoCargado}`);
      } catch (err) {
        console.error(err);
        documentoCargado = "";
        status.textContent = "⚠️ Error al leer el archivo.";
        speakRobotic("Error al leer el archivo.");
      }
    });

    // Carga automática cuando el documento llega compartido por URL (?doc= o ?url=)
    (function autoLoadSharedDoc() {
      const params = new URLSearchParams(window.location.search);
      const sharedUrl = params.get("doc") || params.get("url");
      if (sharedUrl) {
        docUrlInput.value = sharedUrl;
        menu.classList.add("open");
        loadDocumentFromUrl(sharedUrl);
      }
    })();

    // === Chat ===
    question.addEventListener("keypress", e => {
      if (e.key === "Enter" && question.value.trim()) {
        const query = question.value.trim();
        addMessage(query, "user");
        question.value = "";
        medusaRespond(query);
      }
    });

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `msg ${sender}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function medusaRespond(query) {
      if (!documentoCargado) {
        addMessage("⚠️ Cargá primero un documento.", "bot");
        return;
      }
      if (!BACKEND_URL) {
        addMessage("⚠️ Configurá la URL del backend en el menú (☰ → Backend de preguntas) para poder responder.", "bot");
        return;
      }
      addMessage("💭 Pensando...", "bot");
      try {
        const res = await fetch(`${BACKEND_URL}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            context: documentoCargado.slice(0, 8000),
            question: query
          })
        });
        const data = await res.json();
        const reply = data.reply || "⚡ No obtuve respuesta.";
        messages.lastChild.textContent = reply;
        speakRobotic(reply);
        pulse = 6;
      } catch (err) {
        console.error(err);
        const errorMsg = "⚠️ Error al conectar con ChatGPT.";
        messages.lastChild.textContent = errorMsg;
        speakRobotic(errorMsg);
      }
    }

    // === Canvas y animación ===
    function resizeCanvas() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const pointer = { x: innerWidth / 2, y: innerHeight / 2 };
    const core = { x: pointer.x, y: pointer.y, vx: 0, vy: 0, radius: 30 };
    let lastMove = Date.now();

    window.addEventListener("mousemove", e => updatePointer(e.clientX, e.clientY));
    window.addEventListener("touchmove", e => {
      e.preventDefault();
      const t = e.touches[0];
      updatePointer(t.clientX, t.clientY);
    }, { passive: false });

    function updatePointer(x, y) {
      pointer.x = x;
      pointer.y = y;
      lastMove = Date.now();
    }

    class Tentacle {
      constructor(core, angle) {
        this.core = core; this.angle = angle;
        this.length = 100 + Math.random() * 80;
        this.segments = [];
        this.noise = Math.random() * 100;
        this.phase = Math.random() * Math.PI * 2;
        const segCount = Math.floor(this.length / 10);
        for (let i = 0; i < segCount; i++) this.segments.push({ x: core.x, y: core.y });
      }
      update(t) {
        const baseAngle = this.angle + Math.sin(t * 0.001 + this.phase) * 0.3;
        const dirX = Math.cos(baseAngle) * 180;
        const dirY = Math.sin(baseAngle) * 180;
        let prevX = this.core.x, prevY = this.core.y;
        const segLen = 10;
        for (let i = 0; i < this.segments.length; i++) {
          const seg = this.segments[i];
          const pct = i / this.segments.length;
          const wave = Math.sin(t * 0.004 + this.noise + i * 0.3) * 60 * (1 - pct);
          const swayAngle = baseAngle + Math.PI / 2;
          const targetX = this.core.x + dirX * pct + wave * Math.cos(swayAngle);
          const targetY = this.core.y + dirY * pct + wave * Math.sin(swayAngle);
          const dx = targetX - prevX, dy = targetY - prevY;
          const dist = Math.hypot(dx, dy) || 1;
          const ratio = segLen / dist;
          seg.x = prevX + dx * ratio;
          seg.y = prevY + dy * ratio;
          prevX = seg.x; prevY = seg.y;
        }
      }
      draw(ctx, flicker) {
        const { r, g, b } = hexToRgb(mainColor);
        const grad = ctx.createLinearGradient(this.core.x, this.core.y, this.segments.at(-1).x, this.segments.at(-1).y);
        grad.addColorStop(0, `rgba(${r},${g},${b},${0.8 + flicker * 0.2})`);
        grad.addColorStop(1, `rgba(${r * 0.4},${g * 0.4},${b * 0.4},${0.3 + flicker * 0.2})`);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.beginPath();
        ctx.moveTo(this.core.x, this.core.y);
        for (const p of this.segments) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2 + flicker * 2;
        ctx.shadowBlur = 25 + flicker * 45;
        ctx.shadowColor = `rgba(${r},${g},${b},0.7)`;
        ctx.stroke();
        ctx.restore();
      }
    }

    const tentacles = Array.from({ length: 65 }, (_, i) => new Tentacle(core, (i / 65) * Math.PI * 2));
    let pulse = 0;

    function animate(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (autoMode) {
        autoHue = (autoHue + 0.5) % 360;
        mainColor = hslToHex(autoHue, 100, 65);
        colorPicker.value = mainColor;
      }

      const timeSinceMove = Date.now() - lastMove;
      const flicker = Math.random() * 0.6 + pulse * 0.3;
      pulse = Math.max(pulse - 0.05, 0);

      const targetX = pointer.x + Math.sin(t * 0.001) * 100 * Math.min(timeSinceMove / 2000, 1);
      const targetY = pointer.y + Math.cos(t * 0.0013) * 80 * Math.min(timeSinceMove / 2000, 1);

      const ax = (targetX - core.x) * 0.01;
      const ay = (targetY - core.y) * 0.01;
      core.vx += ax; core.vy += ay;
      core.vx *= 0.95; core.vy *= 0.95;
      core.x += core.vx; core.y += core.vy;

      const { r, g, b } = hexToRgb(mainColor);

      ctx.save();
      const gGlow = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, 150);
      gGlow.addColorStop(0, `rgba(${r},${g},${b},${0.9 + flicker * 0.2})`);
      gGlow.addColorStop(0.3, `rgba(${r * 0.7},${g * 0.7},${b * 0.7},${0.3 + flicker * 0.2})`);
      gGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gGlow;
      ctx.beginPath();
      ctx.arc(core.x, core.y, core.radius * (3.5 + flicker * 0.8), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.beginPath();
      ctx.fillStyle = `rgba(${r},${g},${b},${0.9 + flicker * 0.2})`;
      ctx.arc(core.x, core.y, core.radius * (1.1 + flicker * 0.1), 0, Math.PI * 2);
      ctx.fill();

      for (const tacle of tentacles) {
        tacle.update(t);
        tacle.draw(ctx, flicker);
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
