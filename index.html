<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medusa Inteligente – Grupo Fiancar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #030712 0%, #000 90%);
      font-family: "Inter", sans-serif;
      color: #7dcaff;
    }
    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block; cursor: none;
    }

    /* Menú hamburguesa */
    .menu-btn {
      position: absolute;
      top: 15px; right: 20px;
      z-index: 10;
      width: 32px; height: 24px;
      cursor: pointer;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }
    .menu-btn div {
      height: 4px;
      background: #7dcaff;
      border-radius: 2px;
      transition: 0.3s;
    }
    .menu {
      position: absolute;
      top: 55px; right: 15px;
      width: 280px;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 15;
      backdrop-filter: blur(8px);
    }
    .menu.open { display: flex; }
    .menu label {
      font-size: 0.9em;
      color: #9cdcff;
      margin-bottom: 2px;
    }
    .menu input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
    }
    .menu input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 6px;
    }
    .url-box {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .url-box input {
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      background: #0a1724;
      color: #7dcaff;
      font-size: 0.8em;
      outline: none;
    }
    .url-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: none;
      background: rgba(125,202,255,0.2);
      color: #7dcaff;
      font-size: 0.8em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .url-btn:hover { background: rgba(125,202,255,0.4); }
    .status {
      font-size: 0.8em;
      color: #9cdcff;
      opacity: 0.85;
    }
    .voice-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9em;
      color: #9cdcff;
    }
    .voice-row select {
      flex: 1;
      padding: 4px 6px;
      border-radius: 6px;
      border: none;
      background: #0a1724;
      color: #7dcaff;
      font-size: 0.8em;
      outline: none;
    }
    /* Indicador hablando */
    #speakingDot {
      display: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #7eff8b;
      box-shadow: 0 0 8px #7eff8b;
      animation: blink 0.5s alternate infinite;
    }
    @keyframes blink { from { opacity: 1; } to { opacity: 0.2; } }

    /* Chat */
    .chat {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      background: rgba(0,0,0,0.6);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      box-shadow: 0 -2px 18px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      padding: 12px;
      color: #cde9ff;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.85em;
      color: #7dcaff;
    }
    .messages {
      flex: 1;
      max-height: 240px;
      overflow-y: auto;
      font-size: 0.88em;
      margin-bottom: 8px;
    }
    .msg {
      margin: 4px 0;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1.4;
    }
    .msg.user { background: rgba(125,202,255,0.15); text-align: right; }
    .msg.bot  { background: rgba(125,202,255,0.05); text-align: left; }
    .chat-input-row {
      display: flex;
      gap: 6px;
    }
    .chat input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      font-family: inherit;
      font-size: 0.9em;
    }
    .send-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: rgba(125,202,255,0.25);
      color: #7dcaff;
      cursor: pointer;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .send-btn:hover { background: rgba(125,202,255,0.45); }
    .stop-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: rgba(255,128,128,0.25);
      color: #ff8080;
      cursor: pointer;
      font-size: 0.9em;
      display: none;
      transition: background 0.2s;
    }
    .stop-btn.visible { display: block; }
    .stop-btn:hover { background: rgba(255,128,128,0.45); }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Menú hamburguesa -->
  <div class="menu-btn" id="menuBtn">
    <div></div><div></div><div></div>
  </div>

  <div class="menu" id="menu">
    <div>
      <label for="color">🎨 Color manual</label>
      <input type="color" id="color" value="#7dcaff">
    </div>
    <div>
      <label><input type="checkbox" id="autoColor"> Cambio automático de color</label>
    </div>

    <hr style="border-color: rgba(255,255,255,0.1);">

    <div class="url-box">
      <label for="docUrl">📖 URL del libro / documento</label>
      <input type="text" id="docUrl" placeholder="https://ejemplo.com/libro.txt">
      <button class="url-btn" id="loadBtn">Cargar documento</button>
      <div class="status" id="status">Sin documento cargado</div>
    </div>

    <hr style="border-color: rgba(255,255,255,0.1);">

    <div class="voice-row">
      <span id="speakingDot"></span>
      <label><input type="checkbox" id="voiceEnabled" checked> 🔊 Voz activada</label>
    </div>
    <div class="voice-row">
      <label>Voz:</label>
      <select id="voiceSelect"></select>
    </div>
  </div>

  <!-- Chat (siempre visible) -->
  <div class="chat" id="chat">
    <div class="chat-header">
      <span>🪼 Medusa</span>
      <span id="docLabel" style="opacity:0.6; font-size:0.85em;">Sin libro cargado</span>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">¡Hola! Soy Medusa 🪼⚡ Podés hacerme preguntas directamente o cargar un libro / documento desde el menú (arriba a la derecha) para que lo lea y te cuente todo.</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="question" placeholder="Escribí tu pregunta...">
      <button class="send-btn" id="sendBtn">➤</button>
      <button class="stop-btn" id="stopBtn">⏹</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "http://localhost:3000/ask";

    // === Elementos DOM ===
    const canvas      = document.getElementById("canvas");
    const ctx         = canvas.getContext("2d", { alpha: true });
    const colorPicker = document.getElementById("color");
    const autoColor   = document.getElementById("autoColor");
    const menu        = document.getElementById("menu");
    const menuBtn     = document.getElementById("menuBtn");
    const docUrlInput = document.getElementById("docUrl");
    const loadBtn     = document.getElementById("loadBtn");
    const statusEl    = document.getElementById("status");
    const docLabel    = document.getElementById("docLabel");
    const messages    = document.getElementById("messages");
    const question    = document.getElementById("question");
    const sendBtn     = document.getElementById("sendBtn");
    const stopBtn     = document.getElementById("stopBtn");
    const voiceEnabled= document.getElementById("voiceEnabled");
    const voiceSelect = document.getElementById("voiceSelect");
    const speakingDot = document.getElementById("speakingDot");

    menuBtn.addEventListener("click", () => menu.classList.toggle("open"));

    // === Color ===
    let mainColor = colorPicker.value;
    let autoHue = 200;
    let autoMode = false;
    colorPicker.addEventListener("input", e => mainColor = e.target.value);
    autoColor.addEventListener("change", e => autoMode = e.target.checked);

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
        return Math.round(255 * c);
      };
      return "#" + [f(0), f(8), f(4)].map(x => x.toString(16).padStart(2, "0")).join("");
    }
    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    // === Voz (SpeechSynthesis) ===
    let voices = [];
    let isSpeaking = false;

    function loadVoices() {
      voices = speechSynthesis.getVoices();
      const esVoices = voices.filter(v => v.lang.startsWith("es"));
      voiceSelect.innerHTML = "";
      const list = esVoices.length ? esVoices : voices;
      list.forEach((v, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        // Preferir voz femenina en español
        if (v.lang.startsWith("es") && /female|femenin|mujer/i.test(v.name)) opt.selected = true;
        voiceSelect.appendChild(opt);
      });
    }

    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function getSelectedVoice() {
      const allList = voices.filter(v => v.lang.startsWith("es")).length
        ? voices.filter(v => v.lang.startsWith("es"))
        : voices;
      return allList[parseInt(voiceSelect.value)] || allList[0] || voices[0];
    }

    function speakText(text) {
      if (!voiceEnabled.checked || !window.speechSynthesis) return;
      speechSynthesis.cancel();
      const cleanText = text.replace(/[\u{1F300}-\u{1FFFF}]/gu, "").trim();
      if (!cleanText) return;

      const utter = new SpeechSynthesisUtterance(cleanText);
      const voice = getSelectedVoice();
      if (voice) utter.voice = voice;
      utter.lang = "es-AR";
      utter.rate = 1.05;
      utter.pitch = 1.15;

      utter.onstart = () => {
        isSpeaking = true;
        speakingDot.style.display = "inline-block";
        stopBtn.classList.add("visible");
        pulse = 8;
      };
      utter.onend = utter.onerror = () => {
        isSpeaking = false;
        speakingDot.style.display = "none";
        stopBtn.classList.remove("visible");
      };
      speechSynthesis.speak(utter);
    }

    stopBtn.addEventListener("click", () => {
      speechSynthesis.cancel();
      isSpeaking = false;
      speakingDot.style.display = "none";
      stopBtn.classList.remove("visible");
    });

    // === Documento remoto ===
    let documentoCargado = "";

    async function cargarDocumento() {
      const url = docUrlInput.value.trim();
      if (!url) return;
      statusEl.textContent = "⏳ Cargando documento...";
      loadBtn.disabled = true;

      try {
        let texto = "";

        // Intentar fetch directo primero, luego proxy CORS
        const tryFetch = async (fetchUrl) => {
          const r = await fetch(fetchUrl);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r;
        };

        let response;
        let usedProxy = false;
        try {
          response = await tryFetch(url);
        } catch {
          const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
          const proxyRes = await tryFetch(proxy);
          const data = await proxyRes.json();
          // allorigins devuelve { contents: "..." }
          const contenido = data.contents;
          const ext = url.split("?")[0].split(".").pop().toLowerCase();
          if (["html","htm"].includes(ext) || contenido.trimStart().startsWith("<")) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(contenido, "text/html");
            // Remover scripts y estilos
            doc.querySelectorAll("script,style,nav,footer,header").forEach(el => el.remove());
            texto = doc.body?.innerText || contenido;
          } else {
            texto = contenido;
          }
          usedProxy = true;
        }

        if (!usedProxy) {
          const contentType = response.headers.get("content-type") || "";
          if (contentType.includes("html")) {
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            doc.querySelectorAll("script,style,nav,footer,header").forEach(el => el.remove());
            texto = doc.body?.innerText || html;
          } else {
            texto = await response.text();
          }
        }

        documentoCargado = texto.replace(/\s+/g, " ").trim();

        if (!documentoCargado) throw new Error("Documento vacío");

        const palabras = documentoCargado.split(" ").length;
        statusEl.textContent = `✅ Documento cargado (≈${palabras} palabras).`;
        docLabel.textContent = "📖 " + url.split("/").pop().slice(0, 30);
        mainColor = "#7eff8b";
        colorPicker.value = "#7eff8b";
        pulse = 10;
        addMessage(`📖 ¡Documento cargado! Tiene aproximadamente ${palabras} palabras. ¿Qué querés saber?`, "bot");
        speakText("¡Documento cargado! ¿Qué querés saber?");
      } catch (err) {
        console.error(err);
        statusEl.textContent = "⚠️ Error al leer el documento.";
        addMessage("⚠️ No pude leer ese documento. Verificá la URL.", "bot");
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener("click", cargarDocumento);
    docUrlInput.addEventListener("keypress", e => { if (e.key === "Enter") cargarDocumento(); });

    // === Chat ===
    function sendMessage() {
      const query = question.value.trim();
      if (!query) return;
      addMessage(query, "user");
      question.value = "";
      medusaRespond(query);
    }

    sendBtn.addEventListener("click", sendMessage);
    question.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `msg ${sender}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    async function medusaRespond(query) {
      const thinkingDiv = addMessage("💭 Pensando...", "bot");
      pulse = 5;
      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            context: documentoCargado || null,
            question: query
          })
        });
        const data = await res.json();
        const reply = data.reply || "⚡ No obtuve respuesta.";
        thinkingDiv.textContent = reply;
        messages.scrollTop = messages.scrollHeight;
        if (data.color) {
          mainColor = data.color;
          colorPicker.value = data.color;
        }
        pulse = 8;
        speakText(reply);
      } catch (err) {
        console.error(err);
        thinkingDiv.textContent = "⚠️ No pude conectarme con el servidor. ¿Está corriendo?";
        speakText("No pude conectarme. Asegurate de que el servidor esté activo.");
      }
    }

    // === Canvas y animación ===
    function resizeCanvas() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const pointer = { x: innerWidth / 2, y: innerHeight / 2 };
    const core = { x: pointer.x, y: pointer.y, vx: 0, vy: 0, radius: 30 };
    let lastMove = Date.now();

    window.addEventListener("mousemove", e => updatePointer(e.clientX, e.clientY));
    window.addEventListener("touchmove", e => {
      e.preventDefault();
      const t = e.touches[0];
      updatePointer(t.clientX, t.clientY);
    }, { passive: false });

    function updatePointer(x, y) {
      pointer.x = x;
      pointer.y = y;
      lastMove = Date.now();
    }

    class Tentacle {
      constructor(core, angle) {
        this.core = core;
        this.angle = angle;
        this.length = 100 + Math.random() * 80;
        this.segments = [];
        this.noise = Math.random() * 100;
        this.phase = Math.random() * Math.PI * 2;
        const segCount = Math.floor(this.length / 10);
        for (let i = 0; i < segCount; i++) this.segments.push({ x: core.x, y: core.y });
      }
      update(t) {
        const baseAngle = this.angle + Math.sin(t * 0.001 + this.phase) * 0.3;
        const dirX = Math.cos(baseAngle) * 180;
        const dirY = Math.sin(baseAngle) * 180;
        let prevX = this.core.x, prevY = this.core.y;
        const segLen = 10;
        // Mientras habla, las tentáculas se agitan más
        const speechFactor = isSpeaking ? 1.8 : 1;
        for (let i = 0; i < this.segments.length; i++) {
          const seg = this.segments[i];
          const pct = i / this.segments.length;
          const wave = Math.sin(t * 0.004 * speechFactor + this.noise + i * 0.3) * 60 * (1 - pct) * speechFactor;
          const swayAngle = baseAngle + Math.PI / 2;
          const targetX = this.core.x + dirX * pct + wave * Math.cos(swayAngle);
          const targetY = this.core.y + dirY * pct + wave * Math.sin(swayAngle);
          const dx = targetX - prevX, dy = targetY - prevY;
          const dist = Math.hypot(dx, dy) || 1;
          const ratio = segLen / dist;
          seg.x = prevX + dx * ratio;
          seg.y = prevY + dy * ratio;
          prevX = seg.x; prevY = seg.y;
        }
      }
      draw(ctx, flicker) {
        const { r, g, b } = hexToRgb(mainColor);
        const grad = ctx.createLinearGradient(
          this.core.x, this.core.y,
          this.segments.at(-1).x, this.segments.at(-1).y
        );
        grad.addColorStop(0, `rgba(${r},${g},${b},${0.8 + flicker * 0.2})`);
        grad.addColorStop(1, `rgba(${r * 0.4},${g * 0.4},${b * 0.4},${0.3 + flicker * 0.2})`);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.beginPath();
        ctx.moveTo(this.core.x, this.core.y);
        for (const p of this.segments) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2 + flicker * 2 + (isSpeaking ? 1 : 0);
        ctx.shadowBlur = 25 + flicker * 45 + (isSpeaking ? 20 : 0);
        ctx.shadowColor = `rgba(${r},${g},${b},0.7)`;
        ctx.stroke();
        ctx.restore();
      }
    }

    const tentacles = Array.from({ length: 65 }, (_, i) => new Tentacle(core, (i / 65) * Math.PI * 2));
    let pulse = 0;

    function animate(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (autoMode) {
        autoHue = (autoHue + 0.5) % 360;
        mainColor = hslToHex(autoHue, 100, 65);
        colorPicker.value = mainColor;
      }

      const timeSinceMove = Date.now() - lastMove;
      // El flicker aumenta mientras habla
      const speechBoost = isSpeaking ? 0.4 + Math.sin(t * 0.02) * 0.3 : 0;
      const flicker = Math.random() * 0.6 + pulse * 0.3 + speechBoost;
      pulse = Math.max(pulse - 0.05, 0);

      const targetX = pointer.x + Math.sin(t * 0.001) * 100 * Math.min(timeSinceMove / 2000, 1);
      const targetY = pointer.y + Math.cos(t * 0.0013) * 80 * Math.min(timeSinceMove / 2000, 1);

      const ax = (targetX - core.x) * 0.01;
      const ay = (targetY - core.y) * 0.01;
      core.vx += ax; core.vy += ay;
      core.vx *= 0.95; core.vy *= 0.95;
      core.x += core.vx; core.y += core.vy;

      const { r, g, b } = hexToRgb(mainColor);

      // Halo exterior (más grande mientras habla)
      ctx.save();
      const glowRadius = isSpeaking ? 200 + Math.sin(t * 0.01) * 40 : 150;
      const gGlow = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, glowRadius);
      gGlow.addColorStop(0, `rgba(${r},${g},${b},${0.9 + flicker * 0.2})`);
      gGlow.addColorStop(0.3, `rgba(${r * 0.7},${g * 0.7},${b * 0.7},${0.3 + flicker * 0.2})`);
      gGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gGlow;
      ctx.beginPath();
      ctx.arc(core.x, core.y, core.radius * (3.5 + flicker * 0.8), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Núcleo
      ctx.beginPath();
      ctx.fillStyle = `rgba(${r},${g},${b},${0.9 + flicker * 0.2})`;
      ctx.arc(core.x, core.y, core.radius * (1.1 + flicker * 0.1), 0, Math.PI * 2);
      ctx.fill();

      // Onda de voz (anillos pulsantes mientras habla)
      if (isSpeaking) {
        const rings = 3;
        for (let i = 0; i < rings; i++) {
          const phase = (t * 0.005 + i * 0.5) % 1;
          const maxR = core.radius * 6;
          ctx.beginPath();
          ctx.arc(core.x, core.y, phase * maxR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${r},${g},${b},${(1 - phase) * 0.35})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      for (const tacle of tentacles) {
        tacle.update(t);
        tacle.draw(ctx, flicker);
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
