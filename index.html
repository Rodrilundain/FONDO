<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medusa Inteligente – Grupo Fiancar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Menú hamburguesa -->
  <div class="menu-btn" id="menuBtn">
    <div></div><div></div><div></div>
  </div>

  <div class="menu" id="menu">
    <div class="menu-header">
      <h3>Configuración</h3>
      <button id="closeMenu">&times;</button>
    </div>
    <div class="menu-content">
      <div class="setting-item">
        <label for="color">🎨 Color manual</label>
        <input type="color" id="color" value="#7dcaff">
      </div>

      <div class="setting-item">
        <label><input type="checkbox" id="autoColor"> Cambio automático</label>
      </div>

      <div class="url-box">
        <label for="docUrl">🗂️ URL documento</label>
        <input type="text" id="docUrl" placeholder="https://ejemplo.com/documento">
        <div class="status" id="status">Sin documento cargado</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="chat-header">
      <div class="medusa-avatar">🪼</div>
      <span>Medusa Asistente</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="question" placeholder="Escribí tu pregunta...">
      <button id="sendBtn">➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
