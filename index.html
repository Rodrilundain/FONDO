<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Medusa Inteligente – Asistente visual interactivo de Grupo Fiancar" />
  <title>Medusa Inteligente – Grupo Fiancar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #030712 0%, #000 90%);
      font-family: "Inter", sans-serif;
      color: #7dcaff;
    }
    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: block; cursor: none;
    }

    /* ── Menú hamburguesa ── */
    .menu-btn {
      position: absolute;
      top: 15px; right: 20px;
      z-index: 10;
      width: 32px; height: 24px;
      cursor: pointer;
      display: flex; flex-direction: column;
      justify-content: space-between;
      background: none; border: none; padding: 0;
    }
    .menu-btn div {
      height: 4px;
      background: #7dcaff;
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    /* Animación X al abrir */
    .menu-btn[aria-expanded="true"] div:nth-child(1) { transform: translateY(10px) rotate(45deg); }
    .menu-btn[aria-expanded="true"] div:nth-child(2) { opacity: 0; }
    .menu-btn[aria-expanded="true"] div:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

    .menu {
      position: absolute;
      top: 55px; right: 15px;
      width: 270px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 15;
      backdrop-filter: blur(8px);
    }
    .menu.open { display: flex; }
    .menu label {
      font-size: 0.9em;
      color: #9cdcff;
      margin-bottom: 2px;
      cursor: pointer;
    }
    .menu input[type="color"] {
      width: 100%;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
    }
    .menu input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 6px;
      cursor: pointer;
    }
    .url-box { display: flex; flex-direction: column; }
    .url-box input {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(125,202,255,0.2);
      background: #0a1724;
      color: #7dcaff;
      font-size: 0.8em;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-box input:focus { border-color: rgba(125,202,255,0.6); }
    .status {
      font-size: 0.8em;
      margin-top: 4px;
      color: #9cdcff;
      opacity: 0.8;
      min-height: 1.2em;
    }

    /* ── Chat ── */
    .chat {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 480px;
      background: rgba(0,0,0,0.6);
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      box-shadow: 0 -2px 18px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      padding: 12px;
      color: #cde9ff;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    .chat.visible { display: flex; }
    .messages {
      flex: 1;
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.9em;
      margin-bottom: 8px;
      scroll-behavior: smooth;
    }
    .msg {
      margin: 4px 0;
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1.3;
      word-break: break-word;
    }
    .msg.user { background: rgba(125,202,255,0.15); text-align: right; }
    .msg.bot  { background: rgba(125,202,255,0.05); text-align: left; }
    .msg.loading { opacity: 0.6; font-style: italic; }

    .chat-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .chat-row input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      font-family: inherit;
    }
    .send-btn {
      background: rgba(125,202,255,0.2);
      border: 1px solid rgba(125,202,255,0.4);
      color: #7dcaff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.2s;
      line-height: 1;
    }
    .send-btn:hover  { background: rgba(125,202,255,0.35); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Menú hamburguesa -->
  <button class="menu-btn" id="menuBtn"
    aria-label="Abrir menú de configuración"
    aria-expanded="false"
    aria-controls="menu">
    <div></div><div></div><div></div>
  </button>

  <div class="menu" id="menu" role="dialog" aria-label="Configuración">
    <div>
      <label for="color">🎨 Color manual</label>
      <input type="color" id="color" value="#7dcaff">
    </div>
    <div>
      <label><input type="checkbox" id="autoColor"> Cambio automático de color</label>
    </div>
    <div class="url-box">
      <label for="docUrl">🗂️ URL documento</label>
      <input type="text" id="docUrl" placeholder="https://ejemplo.com/documento" autocomplete="off">
      <div class="status" id="status" aria-live="polite">Sin documento cargado</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat" role="region" aria-label="Chat con Medusa">
    <div class="messages" id="messages" aria-live="polite"></div>
    <div class="chat-row">
      <input type="text" id="question"
        placeholder="Escribí tu pregunta..."
        aria-label="Pregunta para la Medusa">
      <button class="send-btn" id="sendBtn" aria-label="Enviar" disabled>➤</button>
    </div>
  </div>

  <script>
    // 🔧 Cambiá esto por tu endpoint real
    const BACKEND_URL = "https://TU_DOMINIO/ask";

    // ── DOM refs ──────────────────────────────────────────────
    const canvas      = document.getElementById("canvas");
    const ctx         = canvas.getContext("2d", { alpha: true });
    const colorPicker = document.getElementById("color");
    const autoColorCb = document.getElementById("autoColor");
    const menu        = document.getElementById("menu");
    const menuBtn     = document.getElementById("menuBtn");
    const docUrlInput = document.getElementById("docUrl");
    const statusEl    = document.getElementById("status");
    const chat        = document.getElementById("chat");
    const messagesEl  = document.getElementById("messages");
    const questionEl  = document.getElementById("question");
    const sendBtn     = document.getElementById("sendBtn");

    // ── Menú ─────────────────────────────────────────────────
    menuBtn.addEventListener("click", () => {
      const isOpen = menu.classList.toggle("open");
      menuBtn.setAttribute("aria-expanded", isOpen);
    });

    // Cerrar menú al hacer clic fuera
    document.addEventListener("click", e => {
      if (menu.classList.contains("open") &&
          !menu.contains(e.target) &&
          !menuBtn.contains(e.target)) {
        menu.classList.remove("open");
        menuBtn.setAttribute("aria-expanded", "false");
      }
    });

    // ── Color ─────────────────────────────────────────────────
    let mainColor = colorPicker.value;
    let autoHue   = 200;
    let autoMode  = false;

    colorPicker.addEventListener("input", e => { mainColor = e.target.value; });
    autoColorCb.addEventListener("change", e => {
      autoMode = e.target.checked;
      colorPicker.disabled = autoMode;
    });

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(-1, Math.min(k - 3, Math.min(9 - k, 1)));
        return Math.round(255 * c).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    // ── Documento remoto ──────────────────────────────────────
    let documentoCargado = "";

    docUrlInput.addEventListener("change", async () => {
      const url = docUrlInput.value.trim();
      if (!url) return;
      statusEl.textContent = "⏳ Cargando documento...";
      try {
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
        const res   = await fetch(proxy);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data  = await res.json();
        const parser = new DOMParser();
        const doc   = parser.parseFromString(data.contents, "text/html");
        // textContent es más seguro que innerText y funciona sin layout
        documentoCargado = (doc.body.textContent || "").replace(/\s+/g, " ").trim();
        if (!documentoCargado) throw new Error("Contenido vacío");
        statusEl.textContent = "✅ Documento cargado correctamente.";
        chat.classList.add("visible");
        sendBtn.disabled = false;
      } catch (err) {
        console.error(err);
        statusEl.textContent = "⚠️ Error al leer el documento.";
      }
    });

    // ── Chat ─────────────────────────────────────────────────
    function sendMessage() {
      const query = questionEl.value.trim();
      if (!query || sendBtn.disabled) return;
      addMessage(query, "user");
      questionEl.value = "";
      medusaRespond(query);
    }

    questionEl.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
    sendBtn.addEventListener("click", sendMessage);

    function addMessage(text, sender, isLoading = false) {
      const div = document.createElement("div");
      div.className = `msg ${sender}${isLoading ? " loading" : ""}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function medusaRespond(query) {
      if (!documentoCargado) {
        addMessage("⚠️ Cargá primero un documento desde el menú.", "bot");
        return;
      }
      sendBtn.disabled   = true;
      questionEl.disabled = true;
      const loadingEl = addMessage("💭 Pensando...", "bot", true);
      try {
        const res = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            context:  documentoCargado.slice(0, 8000),
            question: query
          })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        loadingEl.textContent = data.reply || "⚡ No obtuve respuesta.";
        loadingEl.classList.remove("loading");
        pulse = 6;
      } catch (err) {
        console.error(err);
        loadingEl.textContent = "⚠️ Error al conectar con el servidor.";
        loadingEl.classList.remove("loading");
      } finally {
        sendBtn.disabled    = false;
        questionEl.disabled = false;
        questionEl.focus();
      }
    }

    // ── Canvas ────────────────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth  * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const pointer = { x: innerWidth / 2, y: innerHeight / 2 };
    const core    = { x: pointer.x, y: pointer.y, vx: 0, vy: 0, radius: 30 };
    let lastMove  = Date.now();

    function updatePointer(x, y) { pointer.x = x; pointer.y = y; lastMove = Date.now(); }
    window.addEventListener("mousemove", e => updatePointer(e.clientX, e.clientY));
    window.addEventListener("touchmove", e => {
      e.preventDefault();
      updatePointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    // ── Tentáculos ────────────────────────────────────────────
    class Tentacle {
      constructor(core, angle) {
        this.core  = core;
        this.angle = angle;
        this.length = 100 + Math.random() * 80;
        this.noise  = Math.random() * 100;
        this.phase  = Math.random() * Math.PI * 2;
        const count = Math.floor(this.length / 10);
        this.segments = Array.from({ length: count }, () => ({ x: core.x, y: core.y }));
      }

      update(t) {
        const baseAngle = this.angle + Math.sin(t * 0.001 + this.phase) * 0.3;
        const dirX = Math.cos(baseAngle) * 180;
        const dirY = Math.sin(baseAngle) * 180;
        let prevX = this.core.x, prevY = this.core.y;
        const total  = this.segments.length;
        const segLen = 10;
        for (let i = 0; i < total; i++) {
          const seg  = this.segments[i];
          const pct  = i / total;
          const wave = Math.sin(t * 0.004 + this.noise + i * 0.3) * 60 * (1 - pct);
          const sway = baseAngle + Math.PI / 2;
          const tx   = this.core.x + dirX * pct + wave * Math.cos(sway);
          const ty   = this.core.y + dirY * pct + wave * Math.sin(sway);
          const dx   = tx - prevX, dy = ty - prevY;
          const dist = Math.hypot(dx, dy) || 1;
          const r    = segLen / dist;
          seg.x = prevX + dx * r;
          seg.y = prevY + dy * r;
          prevX = seg.x; prevY = seg.y;
        }
      }

      // r, g, b se calculan UNA vez por frame y se pasan como parámetro
      draw(ctx, flicker, r, g, b) {
        const last = this.segments[this.segments.length - 1];
        const grad = ctx.createLinearGradient(this.core.x, this.core.y, last.x, last.y);
        grad.addColorStop(0, `rgba(${r},${g},${b},${(0.8 + flicker * 0.2).toFixed(2)})`);
        grad.addColorStop(1, `rgba(${r * 0.4 | 0},${g * 0.4 | 0},${b * 0.4 | 0},${(0.3 + flicker * 0.2).toFixed(2)})`);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.beginPath();
        ctx.moveTo(this.core.x, this.core.y);
        for (const p of this.segments) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = 2 + flicker * 2;
        ctx.shadowBlur  = 25 + flicker * 45;
        ctx.shadowColor = `rgba(${r},${g},${b},0.7)`;
        ctx.stroke();
        ctx.restore();
      }
    }

    const TOTAL = 65;
    const tentacles = Array.from(
      { length: TOTAL },
      (_, i) => new Tentacle(core, (i / TOTAL) * Math.PI * 2)
    );
    let pulse = 0;

    // ── Loop de animación ─────────────────────────────────────
    function animate(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Color automático
      if (autoMode) {
        autoHue = (autoHue + 0.5) % 360;
        mainColor = hslToHex(autoHue, 100, 65);
        colorPicker.value = mainColor;
      }

      // RGB calculado UNA sola vez por frame (no 65 veces)
      const { r, g, b } = hexToRgb(mainColor);
      const flicker = Math.random() * 0.6 + pulse * 0.3;
      pulse = Math.max(pulse - 0.05, 0);

      // Movimiento flotante cuando está inactivo
      const drift  = Math.min((Date.now() - lastMove) / 2000, 1);
      const targetX = pointer.x + Math.sin(t * 0.001) * 100 * drift;
      const targetY = pointer.y + Math.cos(t * 0.0013) * 80 * drift;

      core.vx += (targetX - core.x) * 0.01;
      core.vy += (targetY - core.y) * 0.01;
      core.vx *= 0.95; core.vy *= 0.95;
      core.x  += core.vx; core.y += core.vy;

      // Glow radial del núcleo
      ctx.save();
      const gGlow = ctx.createRadialGradient(core.x, core.y, 0, core.x, core.y, 150);
      gGlow.addColorStop(0,   `rgba(${r},${g},${b},${(0.9 + flicker * 0.2).toFixed(2)})`);
      gGlow.addColorStop(0.3, `rgba(${r * 0.7 | 0},${g * 0.7 | 0},${b * 0.7 | 0},${(0.3 + flicker * 0.2).toFixed(2)})`);
      gGlow.addColorStop(1,   "rgba(0,0,0,0)");
      ctx.fillStyle = gGlow;
      ctx.beginPath();
      ctx.arc(core.x, core.y, core.radius * (3.5 + flicker * 0.8), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Núcleo sólido
      ctx.beginPath();
      ctx.fillStyle = `rgba(${r},${g},${b},${(0.9 + flicker * 0.2).toFixed(2)})`;
      ctx.arc(core.x, core.y, core.radius * (1.1 + flicker * 0.1), 0, Math.PI * 2);
      ctx.fill();

      // Dibujar tentáculos con rgb pre-calculado
      for (const tentacle of tentacles) {
        tentacle.update(t);
        tentacle.draw(ctx, flicker, r, g, b);
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
